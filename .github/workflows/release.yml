name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Linux binary
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o habitpal-server ./cmd/server/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: habitpal-server
          path: backend/habitpal-server

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web

      - name: Zip web build
        run: cd build/web && zip -r ../../habitpal-web.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: habitpal-web
          path: frontend/habitpal-web.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: habitpal-server
          path: ./artifacts

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: habitpal-web
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/habitpal-server
            artifacts/habitpal-web.zip
